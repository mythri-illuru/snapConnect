<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SnapConnect</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar">

    <div class="logo">
        <h2>SnapConnect</h2>
    </div>

    <div class="icons">
        <a href="index.html"><i class="bi bi-house-door-fill"></i></a>
        <i class="bi bi-search"></i>
        <i class="bi bi-heart"></i>
        <i class="bi bi-chat-dots"></i>
        <i class="bi bi-gear"></i>
    </div>

</nav>

<div class="profile-page">

    <div class="profile-header">

        <img
        src="https://i.pravatar.cc/200?img=15"
        class="profile-photo">
        <input type="file" id="profileImageInput" accept="image/*">
        <div class="profile-info">

            <h2 id="profileName">mythri_dev</h2>

            <p id="profileBio">💻 Frontend Developer</p>
            <button id="editBtn">Edit Profile</button>

            <div class="stats">

                <div>
                    <h3>24</h3>
                    <p>Posts</p>
                </div>

                <div>
                    <h3>520</h3>
                    <p>Followers</p>
                </div>

                <div>
                    <h3>310</h3>
                    <p>Following</p>
                </div>

            </div>

            <h4>Mythri</h4>

            <p>💻 Frontend Developer</p>

            <p>🌐 www.snapconnect.com</p>

        </div>

    </div>

    <hr>

    <div class="profile-posts">

        <img src="https://picsum.photos/300?1">
        <img src="https://picsum.photos/300?2">
        <img src="https://picsum.photos/300?3">
        <img src="https://picsum.photos/300?4">
        <img src="https://picsum.photos/300?5">
        <img src="https://picsum.photos/300?6">
        <img src="https://picsum.photos/300?7">
        <img src="https://picsum.photos/300?8">
        <img src="https://picsum.photos/300?9">

    </div>

</div>
<script src="profile.js"></script>
<script src="auth.js"></script>
</body>
</html>
