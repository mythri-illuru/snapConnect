<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - SnapConnect</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <h2>SnapConnect</h2>

    <div class="icons">
        <a href="index.html"><i class="bi bi-house-door-fill"></i></a>
        <a href="profile.html"><i class="bi bi-person-circle"></i></a>
    </div>
</nav>

<div class="settings-container">

    <h2>Settings</h2>

    <div class="setting-item">
        <span>🌙 Dark Mode</span>
        <button id="themeBtn">Toggle</button>
    </div>

    <div class="setting-item">
        <span>👤 Edit Profile</span>
        <button onclick="location.href='profile.html'">Open</button>
    </div>

    <div class="setting-item">
        <span>🚪 Logout</span>
        <button id="logoutBtn">Logout</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
